<script>
// ── Generate app icon ──
(function(){
  try {
    const S=512, c=document.createElement('canvas');
    c.width=S; c.height=S;
    const ctx=c.getContext('2d');
    function rr(x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();
    }
    rr(0,0,S,S,100); ctx.fillStyle='#000'; ctx.fill();
    ctx.globalCompositeOperation='screen';
    const T=105, pad=68, hT=T/2;
    function pill(x,y,w,h,color){
      ctx.beginPath();
      const r=Math.min(w,h)/2;
      if(w>=h){ctx.arc(x+r,y+r,r,Math.PI/2,-Math.PI/2,true);ctx.arc(x+w-r,y+r,r,-Math.PI/2,Math.PI/2,false);}
      else{ctx.arc(x+r,y+r,r,Math.PI,0,false);ctx.arc(x+r,y+h-r,r,0,Math.PI,false);}
      ctx.closePath(); ctx.fillStyle=color; ctx.fill();
    }
    function circ(cx,cy,r,color){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();}
    pill(pad,pad,T,S*0.52,'#FFB300');
    pill(pad,S/2-hT,S-pad*2,T,'#CC00FF');
    pill(S-pad-T,S*0.36,T,S*0.52,'#00CCFF');
    circ(S-pad-hT,pad+hT,hT,'#00FFAA');
    circ(pad+hT,S-pad-hT,hT,'#FF1155');
    ctx.globalCompositeOperation='source-over';
    const url=c.toDataURL('image/png');
    ['apple-touch-icon','icon','shortcut icon'].forEach((rel,i)=>{
      const l=document.createElement('link');
      l.rel=rel; if(i===0)l.sizes='180x180';
      l.href=url; document.head.appendChild(l);
    });
  } catch(e){}
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c27;
  --border:rgba(255,255,255,0.07);
  --text:#f0f0f8;
  --muted:#6b6b85;
  --accent:#7c6cfc;
  --accent2:#fc6c9a;
  --green:#4dffa0;
  --red:#ff6c6c;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;top:-100px;left:-80px;
  width:380px;height:380px;
  background:radial-gradient(circle,rgba(124,108,252,0.15) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-80px;right:-60px;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(252,108,154,0.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Views ── */
.view{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.view.active{display:flex}

/* ── Header ── */
.header{padding:52px 22px 16px;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:24px;font-weight:900;letter-spacing:-0.5px}
.header-left p{font-size:12px;color:var(--muted);margin-top:2px}
.sync-btn{
  width:42px;height:42px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;transition:transform 0.3s;
}
.sync-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Balance card ── */
.balance-card{
  margin:0 20px 20px;
  background:linear-gradient(135deg,#1a1830,#1e1528);
  border:1px solid rgba(124,108,252,0.25);
  border-radius:24px;padding:22px;
  position:relative;overflow:hidden;
}
.balance-card::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:140px;height:140px;
  background:radial-gradient(circle,rgba(124,108,252,0.2) 0%,transparent 70%);
}
.bal-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.bal-amount{
  font-size:40px;font-weight:900;letter-spacing:-2px;margin:6px 0 16px;
  background:linear-gradient(90deg,#fff,rgba(255,255,255,0.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.bal-row{display:flex;gap:12px}
.bal-stat{flex:1;background:rgba(255,255,255,0.05);border-radius:14px;padding:12px}
.bal-stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.bal-stat-val{font-size:16px;font-weight:800}
.inc{color:var(--green)} .exp{color:var(--red)}

/* ── Add button ── */
.add-btn{
  margin:0 20px 22px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:18px;padding:17px;
  color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;
  width:calc(100% - 40px);
  display:flex;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;
  box-shadow:0 8px 28px rgba(124,108,252,0.45);
  transition:transform 0.15s,box-shadow 0.15s;
}
.add-btn:active{transform:scale(0.97);box-shadow:0 4px 14px rgba(124,108,252,0.3)}

/* ── Section title ── */
.sec-title{
  padding:0 20px 10px;
  font-size:12px;font-weight:700;color:var(--muted);
  letter-spacing:0.8px;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.sec-link{color:var(--accent);font-size:12px;cursor:pointer}

/* ── Transaction list ── */
.tx-list{flex:1;overflow-y:auto;padding:0 20px 8px}
.date-group-label{
  font-size:11px;font-weight:700;color:var(--muted);
  letter-spacing:0.5px;text-transform:uppercase;
  padding:14px 0 8px;
}
.tx-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 0;border-bottom:1px solid var(--border);
  animation:fadeUp 0.3s ease forwards;
}
.tx-item:last-child{border-bottom:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tx-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tx-amt{font-size:15px;font-weight:800;flex-shrink:0}
.tx-amt.exp{color:var(--red)} .tx-amt.inc{color:var(--green)}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ei{font-size:48px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.7}

/* ── Bottom nav ── */
.bottom-nav{
  position:sticky;bottom:0;
  background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 20px;z-index:100;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;cursor:pointer}
.nav-icon{font-size:22px}
.nav-label{font-size:10px;font-weight:700;color:var(--muted)}
.nav-item.active .nav-label{color:var(--accent)}
.nav-item.active .nav-icon{transform:scale(1.1)}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);z-index:200;
  display:none;align-items:flex-end;
}
.overlay.show{display:flex}
.modal{
  width:100%;max-width:430px;margin:0 auto;
  background:var(--surface);border-radius:28px 28px 0 0;
  padding:0 0 34px;
  animation:slideUp 0.32s cubic-bezier(0.34,1.56,0.64,1);
  max-height:92vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:38px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:12px auto 18px}
.modal-title{padding:0 22px 18px;font-size:20px;font-weight:900;letter-spacing:-0.3px}

/* ── Form elements ── */
.f-sec{padding:0 22px;margin-bottom:18px}
.f-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px}

.amt-wrap{
  display:flex;align-items:center;
  background:var(--surface2);border-radius:18px;padding:15px 18px;gap:8px;
  border:2px solid transparent;transition:border-color 0.2s;
}
.amt-wrap:focus-within{border-color:var(--accent)}
.cur{font-size:26px;font-weight:800;color:var(--muted)}
.amt-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Nunito',sans-serif;font-size:34px;font-weight:800;
  color:var(--text);width:100%;
}
.amt-input::placeholder{color:rgba(255,255,255,0.12)}

.field{
  width:100%;background:var(--surface2);border:2px solid transparent;
  border-radius:14px;padding:14px 16px;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;
  outline:none;transition:border-color 0.2s;
  appearance:none;-webkit-appearance:none;
}
.field:focus{border-color:var(--accent)}
.field option{background:var(--surface)}

/* ── Category grid ── */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:11px 4px;border-radius:15px;
  background:var(--surface2);border:2px solid transparent;
  cursor:pointer;transition:all 0.18s;
}
.cat-btn.sel{border-color:var(--accent);background:rgba(124,108,252,0.15)}
.cat-btn:active{transform:scale(0.93)}
.cat-em{font-size:22px}
.cat-nm{font-size:9px;font-weight:700;color:var(--muted);text-align:center;line-height:1.2}
.cat-btn.sel .cat-nm{color:var(--accent)}

/* ── Payment pills ── */
.pay-row{display:flex;gap:7px;flex-wrap:wrap}
.pay-pill{
  padding:8px 13px;border-radius:20px;
  background:var(--surface2);border:2px solid transparent;
  font-size:12px;font-weight:700;cursor:pointer;
  color:var(--muted);transition:all 0.18s;
}
.pay-pill.sel{border-color:var(--accent2);background:rgba(252,108,154,0.15);color:var(--accent2)}
.pay-pill:active{transform:scale(0.94)}

/* ── Save button ── */
.save-btn{
  margin:4px 22px 0;width:calc(100% - 44px);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:18px;padding:17px;
  color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;box-shadow:0 8px 28px rgba(124,108,252,0.45);
  transition:all 0.15s;
}
.save-btn:active{transform:scale(0.97)}
.save-btn:disabled{opacity:0.5;cursor:not-allowed}

/* ── Stats ── */
.stats-body{flex:1;overflow-y:auto;padding:0 20px 20px}
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-radius:16px;padding:13px 18px;margin-bottom:18px;
}
.marrow{
  width:32px;height:32px;border-radius:10px;
  background:var(--surface2);border:none;color:var(--text);
  font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.mname{font-size:16px;font-weight:800}
.stats-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.s-card{background:var(--surface);border-radius:16px;padding:15px}
.s-card.full{grid-column:span 2}
.s-clabel{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.5px;margin-bottom:5px}
.s-cval{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.cat-bars{display:flex;flex-direction:column;gap:9px}
.cbar-item{background:var(--surface);border-radius:14px;padding:13px;display:flex;align-items:center;gap:11px}
.cbar-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cbar-info{flex:1}
.cbar-name{font-size:12px;font-weight:700;margin-bottom:5px}
.cbar-bg{height:3px;background:rgba(255,255,255,0.07);border-radius:2px}
.cbar-fill{height:3px;border-radius:2px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.cbar-amt{font-size:14px;font-weight:800;flex-shrink:0}

/* ── Toast ── */
.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);
  padding:11px 22px;border-radius:30px;
  font-size:13px;font-weight:700;
  opacity:0;transition:all 0.28s;pointer-events:none;z-index:999;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green);color:#0a0a0f}
.toast.err{background:var(--red);color:#fff}

::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
</style>
</head>
<body>

<!-- ══════════ VIEW: HOME ══════════ -->
<div class="view active" id="v-home">
  <div class="header">
    <div class="header-left">
      <h1>錢袋子 💰</h1>
      <p id="today-lbl"></p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="sync-btn" id="reset-btn" onclick="resetAndSync()" title="清除並重新同步" style="background:rgba(255,108,108,0.15);font-size:16px">🗑️</div>
      <div class="sync-btn" id="sync-btn" onclick="syncFromSheets()" title="從 Google Sheets 同步">🔄</div>
    </div>
  </div>

  <div class="balance-card">
    <div class="bal-label">本月結餘</div>
    <div class="bal-amount" id="bal-amt">$0.00</div>
    <div class="bal-row">
      <div class="bal-stat">
        <div class="bal-stat-label">💚 收入</div>
        <div class="bal-stat-val inc" id="home-inc">$0</div>
      </div>
      <div class="bal-stat">
        <div class="bal-stat-label">🔴 支出</div>
        <div class="bal-stat-val exp" id="home-exp">$0</div>
      </div>
    </div>
  </div>

  <button class="add-btn" onclick="openModal()">＋ &nbsp;記一筆</button>

  <div class="sec-title">
    最近記錄
    <span class="sec-link" onclick="switchView('stats')">統計 →</span>
  </div>

  <div class="tx-list" id="tx-list">
    <div class="empty"><div class="ei">📝</div><p>還沒有記錄<br>點「記一筆」開始吧！</p></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchView('home')"><div class="nav-icon">🏠</div><div class="nav-label">首頁</div></div>
    <div class="nav-item" onclick="switchView('stats')"><div class="nav-icon">📊</div><div class="nav-label">統計</div></div>
    <div class="nav-item" onclick="openModal()"><div class="nav-icon">➕</div><div class="nav-label">記帳</div></div>
  </nav>
</div>

<!-- ══════════ VIEW: STATS ══════════ -->
<div class="view" id="v-stats">
  <div class="header">
    <div class="header-left"><h1>月度統計</h1><p>分類消費分析</p></div>
    <div class="sync-btn" onclick="openModal()">＋</div>
  </div>

  <div class="stats-body">
    <div class="month-nav">
      <button class="marrow" onclick="changeMonth(-1)">‹</button>
      <div class="mname" id="stats-month"></div>
      <button class="marrow" onclick="changeMonth(1)">›</button>
    </div>
    <div class="stats-cards">
      <div class="s-card"><div class="s-clabel">💚 總收入</div><div class="s-cval inc" id="st-inc">$0</div></div>
      <div class="s-card"><div class="s-clabel">🔴 總支出</div><div class="s-cval exp" id="st-exp">$0</div></div>
      <div class="s-card full"><div class="s-clabel">📈 淨結餘</div><div class="s-cval" id="st-net" style="font-size:28px">$0</div></div>
    </div>
    <div class="sec-title" style="padding-left:0">分類明細</div>
    <div class="cat-bars" id="cat-bars"><div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">本月尚無支出記錄</div></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item" onclick="switchView('home')"><div class="nav-icon">🏠</div><div class="nav-label">首頁</div></div>
    <div class="nav-item active" onclick="switchView('stats')"><div class="nav-icon">📊</div><div class="nav-label">統計</div></div>
    <div class="nav-item" onclick="openModal()"><div class="nav-icon">➕</div><div class="nav-label">記帳</div></div>
  </nav>
</div>

<!-- ══════════ MODAL ══════════ -->
<div class="overlay" id="overlay" onclick="handleOvClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增記錄</div>

    <div class="f-sec">
      <div class="f-label">金額 (AUD)</div>
      <div class="amt-wrap">
        <span class="cur">$</span>
        <input class="amt-input" type="number" inputmode="decimal" id="inp-amt" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>

    <div class="f-sec">
      <div class="f-label">分類</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="f-sec">
      <div class="f-label">描述</div>
      <select class="field" id="inp-desc">

        <option>Woolworths</option><option>Coles</option><option>Aldi</option>
        <option>McDonald's</option><option>Gas</option><option>Origin Energy</option>
        <option>Kmart</option><option>Swimming</option><option>Table Tennis</option>
        <option>Wi-Fi</option><option>Opal</option><option>Gym</option>
        <option>TIGS</option><option>Mall</option><option>Amazon</option>
        <option value="__custom__">自行輸入...</option>

      <input class="field" type="text" id="inp-custom" placeholder="自行填寫描述...">
    </div>

    <div class="f-sec">
      <div class="f-label">付款方式</div>
      <div class="pay-row" id="pay-row"></div>
    </div>

    <div class="f-sec">
      <div class="f-label">備註（選填）</div>
      <input class="field" type="text" id="inp-notes" placeholder="例：打折、發票號碼...">
    </div>

    <div class="f-sec">
      <div class="f-label">日期</div>
      <input class="field" type="date" id="inp-date">
    </div>

    <button class="save-btn" id="save-btn" onclick="saveEntry()">儲存並同步 ✓</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────
const API = 'https://script.google.com/macros/s/AKfycbz2y656F_pz7O7BcZIQVfNExWBc3s5srk5aDWf4PMxL4v6km6jsyEoYMLMql_1jNng6/exec';

const CATS = [
  {id:'food',     name:'餐飲', emoji:'🍽️', color:'#ff9f43'},
  {id:'grocery',  name:'超市', emoji:'🛒', color:'#ffd166'},
  {id:'transport',name:'交通', emoji:'🚗', color:'#54a0ff'},
  {id:'education',name:'教育', emoji:'📚', color:'#a29bfe'},
  {id:'shopping', name:'購物', emoji:'🛍️', color:'#ff6b81'},
  {id:'sport',    name:'運動', emoji:'⚽', color:'#00d2d3'},
  {id:'health',   name:'醫療', emoji:'💊', color:'#1dd1a1'},
  {id:'utilities',name:'帳單', emoji:'📡', color:'#6c5ce7'},
  {id:'housing',  name:'住房', emoji:'🏠', color:'#74b9ff'},
  {id:'travel',   name:'旅遊', emoji:'✈️', color:'#fd79a8'},
  {id:'income',   name:'收入', emoji:'💰', color:'#4dffa0'},
  {id:'atm',      name:'提款', emoji:'🏦', color:'#81ecec'},
  {id:'other',    name:'其他', emoji:'📌', color:'#b2bec3'},
];
const PAYS = ['Debit','Credit','Cash','Transfer','PayID'];

let entries = JSON.parse(localStorage.getItem('qiandaizi_v1') || '[]');
let selCat = '';
let selPay = 'Debit';
let statsM = new Date().getMonth();
let statsY = new Date().getFullYear();

// ── Init ──────────────────────────────────────
function resetAndSync(){
  if(!confirm('清除手機所有資料並重新從 Google Sheets 同步？')) return;
  localStorage.removeItem('qiandaizi_v1');
  entries = [];
  renderHome();
  renderStats();
  syncFromSheets(false);
}

function init(){
  const now = new Date();
  document.getElementById('today-lbl').textContent =
    now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('inp-date').value = now.toISOString().slice(0,10);
  buildCatGrid();
  buildPayRow();
  renderHome();
  renderStats();
  updateStatsLabel();
  // Auto sync on load
  syncFromSheets(true);
}

function buildCatGrid(){
  const g = document.getElementById('cat-grid');
  g.innerHTML = '';
  CATS.forEach(c=>{
    const b = document.createElement('div');
    b.className='cat-btn'; b.dataset.id=c.id;
    b.innerHTML=`<div class="cat-em">${c.emoji}</div><div class="cat-nm">${c.name}</div>`;
    b.onclick=()=>selCatFn(c.id);
    g.appendChild(b);
  });
}

function buildPayRow(){
  const r = document.getElementById('pay-row');
  r.innerHTML='';
  PAYS.forEach(p=>{
    const d=document.createElement('div');
    d.className='pay-pill'+(p===selPay?' sel':'');
    d.textContent=p; d.onclick=()=>selPayFn(p);
    r.appendChild(d);
  });
}

function selCatFn(id){
  selCat=id;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('sel',b.dataset.id===id));
}

function selPayFn(p){
  selPay=p;
  document.querySelectorAll('.pay-pill').forEach(b=>b.classList.toggle('sel',b.textContent===p));
}

document.getElementById('inp-desc').addEventListener('change',function(){
  document.getElementById('custom-wrap').style.display = this.value==='__custom__'?'block':'none';
});

// ── Sync from Google Sheets ───────────────────
async function syncFromSheets(silent=false){
  const btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  if(!silent) showToast('🔄 同步中...','ok');
  try {
    const res = await fetch(API+'?t='+Date.now());
    const json = await res.json();
    if(json.status==='ok' && json.data){
      // Merge: keep local entries not yet in sheets, plus all sheets entries
      const sheetsEntries = json.data
        .filter(r=>r['Date']||r['Momey'])
        .map(r=>({
          id: r['Date']+'_'+r['Momey']+'_'+r['Description'],
          date: (function(d){
            if(!d) return '';
            // Handle both '2026-04-12' and '2026-04-12T14:00:00.000Z' formats
            const s = String(d);
            if(s.includes('T')) {
              // Convert to local date to fix timezone offset
              const dt = new Date(s);
              const local = new Date(dt.getTime() - dt.getTimezoneOffset() * -60000);
              return local.toISOString().slice(0,10);
            }
            return s.slice(0,10);
          })(r['Date']),
          category: catIdFromName((r['Category']||r['Category ']||'').toString().trim()),
          description: (r['Description']||r['Description ']||'').toString().trim(),
          payment: (r['Payment']||r['Payment ']||'').toString().trim(),
          amount: parseFloat(r['Momey']||r['Momey '])||0,
          notes: (r['Note']||r['Note ']||'').toString().trim(),
          isIncome: ['收入','income','Income / Deposit'].includes((r['Category']||r['Category ']||'').toString().trim()),
          synced: true,
        }));
      // Merge: sheets entries + local unsynced
      const unsynced = entries.filter(e=>!e.synced);
      const merged = [...sheetsEntries];
      unsynced.forEach(u=>{
        if(!merged.find(s=>s.id===u.id)) merged.push(u);
      });
      merged.sort((a,b)=>b.date.localeCompare(a.date));
      entries = merged;
      localStorage.setItem('qiandaizi_v1', JSON.stringify(entries));
      renderHome(); renderStats();
      if(!silent) showToast('✅ 同步完成','ok');
    }
  } catch(e){
    if(!silent) showToast('⚠️ 網路連線失敗','err');
  }
  btn.classList.remove('spinning');
}

function catIdFromName(name){
  if(!name) return 'other';
  const n = String(name).trim().toLowerCase();
  if(n==='餐飲'||n.includes('food')||n.includes('dining')||n.includes('restaurant')||n.includes('hanok')||n.includes('lunch')||n.includes('dinner')) return 'food';
  if(n==='超市'||n.includes('grocery')||n.includes('supermarket')||n.includes('coles')||n.includes('woolworths')||n.includes('aldi')) return 'grocery';
  if(n==='交通'||n.includes('transport')||n.includes('opal')||n.includes('gas')||n.includes('petrol')||n.includes('uber')||n.includes('bus')) return 'transport';
  if(n==='教育'||n.includes('education')||n.includes('school')||n.includes('tigs')||n.includes('tutor')) return 'education';
  if(n==='購物'||n.includes('shopping')||n.includes('kmart')||n.includes('amazon')||n.includes('mall')||n.includes('big w')) return 'shopping';
  if(n==='運動'||n.includes('sport')||n.includes('gym')||n.includes('swim')||n.includes('tennis')||n.includes('activity')) return 'sport';
  if(n==='醫療'||n.includes('health')||n.includes('medical')||n.includes('doctor')||n.includes('chemist')||n.includes('pharmacy')) return 'health';
  if(n==='帳單'||n.includes('utilit')||n.includes('bill')||n.includes('wifi')||n.includes('internet')||n.includes('electric')||n.includes('origin')) return 'utilities';
  if(n==='住房'||n.includes('hous')||n.includes('rent')||n.includes('home')) return 'housing';
  if(n==='旅遊'||n.includes('travel')||n.includes('hotel')||n.includes('flight')||n.includes('trip')||n.includes('museum')||n.includes('rail')) return 'travel';
  if(n==='收入'||n.includes('income')||n.includes('deposit')||n.includes('salary')||n.includes('housebound')) return 'income';
  if(n==='提款'||n.includes('atm')||n.includes('withdraw')) return 'atm';
  // exact map fallback
  const map={'food':'food','grocery':'grocery','transport':'transport','education':'education',
    'shopping':'shopping','sport':'sport','health':'health','utilities':'utilities',
    'housing':'housing','travel':'travel','income':'income','atm':'atm','other':'other'};
  return map[n]||'other';
}

// ── Save entry ────────────────────────────────
async function saveEntry(){
  const amt = parseFloat(document.getElementById('inp-amt').value);
  if(!amt||amt<=0){showToast('❌ 請輸入金額','err');return;}
  if(!selCat){showToast('❌ 請選擇分類','err');return;}

  const descSel = document.getElementById('inp-desc').value;
  const descCustom = document.getElementById('inp-custom').value.trim();
  const desc = descSel==='__custom__' ? descCustom : (descSel||getCatName(selCat));

  const cat = CATS.find(c=>c.id===selCat);
  const entry = {
    id: Date.now()+'',
    date: document.getElementById('inp-date').value,
    category: selCat,
    description: desc,
    payment: selPay,
    amount: amt,
    notes: document.getElementById('inp-notes').value.trim(),
    isIncome: selCat==='income',
    synced: false,
  };

  // Save locally first
  entries.unshift(entry);
  localStorage.setItem('qiandaizi_v1', JSON.stringify(entries));
  renderHome(); renderStats();
  closeModal();
  showToast('💾 儲存中...','ok');

  // Send to Google Sheets via GET (no CORS issues)
  const btn = document.getElementById('save-btn');
  btn.disabled=true;
  try {
    const params = new URLSearchParams({
      action: 'add',
      date: entry.date,
      category: cat.name,
      description: entry.description,
      payment: entry.payment,
      amount: entry.amount,
      notes: entry.notes || '',
    });
    const res = await fetch(API + '?' + params.toString());
    const json = await res.json();
    if(json.status === 'ok'){
      entry.synced = true;
      localStorage.setItem('qiandaizi_v1', JSON.stringify(entries));
      showToast('✅ 已同步到 Google Sheets','ok');
    } else {
      showToast('⚠️ 本機已儲存，稍後同步','err');
    }
  } catch(e){
    showToast('⚠️ 本機已儲存，稍後同步','err');
  }
  btn.disabled=false;

  // Reset form
  document.getElementById('inp-amt').value='';
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-custom').value='';
  document.getElementById('custom-wrap').style.display='none';
  document.getElementById('inp-notes').value='';
  selCat='';
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
}

// ── Render home ───────────────────────────────
function renderHome(){
  const now=new Date();
  const thisM=entries.filter(e=>{
    const d=new Date(e.date+'T00:00:00');
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  const inc=thisM.filter(e=>e.isIncome).reduce((s,e)=>s+e.amount,0);
  const exp=thisM.filter(e=>!e.isIncome).reduce((s,e)=>s+e.amount,0);
  document.getElementById('bal-amt').textContent=fmt(inc-exp);
  document.getElementById('home-inc').textContent=fmtS(inc);
  document.getElementById('home-exp').textContent=fmtS(exp);

  const list=document.getElementById('tx-list');
  if(!entries.length){
    list.innerHTML='<div class="empty"><div class="ei">📝</div><p>還沒有記錄<br>點「記一筆」開始吧！</p></div>';
    return;
  }
  const grouped={};
  entries.slice(0,40).forEach(e=>{
    if(!grouped[e.date])grouped[e.date]=[];
    grouped[e.date].push(e);
  });
  list.innerHTML='';
  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const lbl=document.createElement('div');
    lbl.className='date-group-label';lbl.textContent=fmtDate(date);
    list.appendChild(lbl);
    grouped[date].forEach(e=>{
      const cat=CATS.find(c=>c.id===e.category)||CATS[12];
      const div=document.createElement('div');
      div.className='tx-item';
      div.innerHTML=`
        <div class="tx-icon" style="background:${cat.color}22">${cat.emoji}</div>
        <div class="tx-info">
          <div class="tx-name">${e.description||cat.name}</div>
          <div class="tx-meta">${cat.name} · ${e.payment||''}${e.notes?' · '+e.notes:''}${!e.synced?' · ⏳':''}</div>
        </div>
        <div class="tx-amt ${e.isIncome?'inc':'exp'}">${e.isIncome?'+':'-'}$${e.amount.toFixed(2)}</div>`;
      list.appendChild(div);
    });
  });
}

// ── Render stats ──────────────────────────────
function renderStats(){
  const filt=entries.filter(e=>{
    const d=new Date(e.date+'T00:00:00');
    return d.getMonth()===statsM&&d.getFullYear()===statsY;
  });
  const inc=filt.filter(e=>e.isIncome).reduce((s,e)=>s+e.amount,0);
  const exp=filt.filter(e=>!e.isIncome).reduce((s,e)=>s+e.amount,0);
  const net=inc-exp;
  document.getElementById('st-inc').textContent=fmtS(inc);
  document.getElementById('st-exp').textContent=fmtS(exp);
  const ne=document.getElementById('st-net');
  ne.textContent=fmt(net);
  ne.style.color=net>=0?'var(--green)':'var(--red)';

  const totals={};
  filt.filter(e=>!e.isIncome).forEach(e=>{totals[e.category]=(totals[e.category]||0)+e.amount});
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const maxA=sorted[0]?.[1]||1;
  const container=document.getElementById('cat-bars');
  if(!sorted.length){
    container.innerHTML='<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">本月尚無支出記錄</div>';
    return;
  }
  container.innerHTML='';
  sorted.forEach(([cid,amt])=>{
    const cat=CATS.find(c=>c.id===cid)||CATS[12];
    const pct=exp>0?Math.round(amt/exp*100):0;
    const bw=Math.round(amt/maxA*100);
    const div=document.createElement('div');
    div.className='cbar-item';
    div.innerHTML=`
      <div class="cbar-icon" style="background:${cat.color}22">${cat.emoji}</div>
      <div class="cbar-info">
        <div class="cbar-name">${cat.name} <span style="color:var(--muted);font-size:10px;font-weight:600">${pct}%</span></div>
        <div class="cbar-bg"><div class="cbar-fill" style="width:${bw}%;background:${cat.color}"></div></div>
      </div>
      <div class="cbar-amt" style="color:${cat.color}">$${amt.toFixed(0)}</div>`;
    container.appendChild(div);
  });
}

function updateStatsLabel(){
  document.getElementById('stats-month').textContent=
    new Date(statsY,statsM,1).toLocaleDateString('zh-TW',{year:'numeric',month:'long'});
}
function changeMonth(d){
  statsM+=d;
  if(statsM>11){statsM=0;statsY++;}
  if(statsM<0){statsM=11;statsY--;}
  updateStatsLabel();renderStats();
}

// ── Modal ─────────────────────────────────────
function openModal(){document.getElementById('overlay').classList.add('show');document.getElementById('inp-amt').focus();}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function handleOvClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

// ── View switch ───────────────────────────────
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+name).classList.add('active');
}

// ── Helpers ───────────────────────────────────
function fmt(n){return(n<0?'-':'')+'$'+Math.abs(n).toFixed(2)}
function fmtS(n){return n>=1000?'$'+(n/1000).toFixed(1)+'K':'$'+n.toFixed(0)}
function getCatName(id){return CATS.find(c=>c.id===id)?.name||id}
function fmtDate(ds){
  const d=new Date(ds+'T00:00:00');
  const t=new Date();t.setHours(0,0,0,0);
  const y=new Date(t);y.setDate(t.getDate()-1);
  if(d.getTime()===t.getTime())return '今天';
  if(d.getTime()===y.getTime())return '昨天';
  return d.toLocaleDateString('zh-TW',{month:'short',day:'numeric',weekday:'short'});
}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

init();
</script>
